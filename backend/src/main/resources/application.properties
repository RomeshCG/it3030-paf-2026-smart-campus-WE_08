spring.application.name=smart-campus-backend

# ==================== H2 In-Memory DB (local dev) ====================
spring.datasource.url=jdbc:h2:mem:smartcampus;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server
server.port=8080

# ==================== JWT ====================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS}

# ==================== Google OAuth2 ====================
google.client-id=${GOOGLE_CLIENT_ID}

# ==================== CORS ====================
app.cors.allowed-origin=http://localhost:5173

# ==================== Invites ====================
app.invites.base-url=http://localhost:5173
app.invites.expiration-hours=72

# ==================== Gmail SMTP (App Password) ====================
# Set MAIL_USERNAME / MAIL_PASSWORD in .env (2FA + App Password on Google Account).
# If username is empty, invite emails are skipped (invite + inviteUrl in API still work).
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# Helps some networks / SSL handshakes with Gmail
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
app.mail.from-name=${MAIL_FROM_NAME:Smart Campus}
